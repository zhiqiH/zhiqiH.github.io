<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zhiqi's Website</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      padding: 1vw;
    }

    .pi-text {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 700;
      line-height: 0.92;

      /*
        允许单词内部换行。
        line-break: anywhere 还会放宽连续标点的换行限制。
      */
      overflow-wrap: anywhere;
      word-break: break-all;
      line-break: anywhere;
    }

    .pi-text span {
      display: inline;

      /*
        1 → 1vw，2 → 2vw，……，9 → 9vw，0 → 10vw。
      */
      font-size: calc(var(--pi-size) * 1vw);
    }
  </style>
</head>

<body>
  <p class="pi-text" id="pi-text"></p>

  <script>
    const phrase = "Hello, Zhiqi's website is building...... ";

    const piDigits =
      "3141592";

    const container = document.getElementById("pi-text");

    /**
     * 将文字添加到元素中，并在每个字符后插入一个不可见的换行机会。
     * 因此单词和连续标点都可以从任意位置断开。
     */
    function appendBreakableText(element, text) {
      const fragment = document.createDocumentFragment();

      for (const character of text) {
        fragment.appendChild(document.createTextNode(character));
        fragment.appendChild(document.createElement("wbr"));
      }

      element.appendChild(fragment);
    }

    for (const digit of piDigits) {
      const span = document.createElement("span");

      // 0 使用 10vw。
      const size = digit === "0" ? 10 : Number(digit);

      span.style.setProperty("--pi-size", size);

      // 不再直接使用 span.textContent = phrase。
      appendBreakableText(span, phrase);

      container.appendChild(span);
    }
  </script>
</body>
</html>
