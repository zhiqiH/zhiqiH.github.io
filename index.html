<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zhiqi's Website</title>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      padding: 1vw;
    }

    .pi-text {
      margin: 0;
      width: 100%;
      font-family: Georgia, "Times New Roman", serif;
      font-weight: 700;
      line-height: 0.92;

      text-align: justify;
      text-align-last: justify;
      text-justify: inter-character;

      overflow-wrap: anywhere;
      word-break: break-all;
    }

    .pi-text span {
      display: inline;

      font-size: calc(var(--pi-size) * 1vw);
    }
  </style>
</head>

<body>
  <p class="pi-text" id="pi-text"></p>

  <script>
    const phrase = "Hello, Zhiqi's website is building...... ";

    const piDigits =
      "314159265358979323846264338327950288419716939937510582097494459230781640628620899862803482534211706798";

    const container = document.getElementById("pi-text");

    function appendBreakableText(element, text) {
      const fragment = document.createDocumentFragment();

      for (const character of text) {
        fragment.appendChild(document.createTextNode(character));
        fragment.appendChild(document.createElement("\u200B"));
      }

      element.appendChild(fragment);
    }

    for (const digit of piDigits) {
      const span = document.createElement("span");

      const size = digit === "0" ? 10 : Number(digit);

      span.style.setProperty("--pi-size", size);

      appendBreakableText(span, phrase);

      container.appendChild(span);
    }
  </script>
</body>
</html>
